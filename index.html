<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMTExODI3Ii8+PHBhdGggZD0iTTUwIDE1TDI1IDU1SDQ1TDQwIDg1TDc1IDQ1SDU1TDYwIDE1WiIgZmlsbD0iIzRBREU4MCIvPjwvc3ZnPg==" />
    <title>Smart Bin Energy Display</title>
    
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #F9FAFB;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6vh 5vw;
        }

        /* Top Section */
        .top-section { text-align: center; width: 100%; }
        .label {
            font-size: 2.5vh; color: #9CA3AF; font-weight: 900; 
            text-transform: uppercase; letter-spacing: -0.025em; margin-bottom: 1vh;
        }
        .value-huge {
            font-size: 11vh; font-weight: 900; color: #4ADE80; 
            text-transform: uppercase; line-height: 1; letter-spacing: -0.025em;
        }

        /* Middle Section */
        .middle-section { width: 100%; max-width: 90vw; }
        .grid-2 {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5vw; 
            width: 100%; text-align: center;
        }
        .value-large {
            font-size: 6.5vh; font-weight: 900; color: #F9FAFB; 
            text-transform: uppercase; letter-spacing: -0.025em;
        }

        /* Progress Bar */
        .bar-container {
            width: 100%; height: 8vh; background-color: #374151; 
            border-radius: 9999px; position: relative; display: flex; 
            align-items: center; padding: 0 1.5vw; margin: 6vh 0;
        }
        .bar-fill {
            height: 5.5vh; border-radius: 9999px; 
            background: linear-gradient(90deg, #4ADE80, #2DD4BF);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
            transition: width 0.2s ease-out; width: 0%;
        }
        .nodes-container {
            position: absolute; inset: 0; display: flex; padding: 0 1.5vw;
        }
        .node-item {
            flex: 1; height: 100%; display: flex; justify-content: center; 
            align-items: center; position: relative; z-index: 10; width: 100%;
        }
        .node-wrapper {
            height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; padding: 1vh;
            transition: transform 0.3s ease-out, filter 0.3s ease-out;
            transform: scale(1); filter: drop-shadow(0 0 0px transparent);
        }
        .node-icon {
            width: 4vh; height: 4vh; fill: none; stroke: currentColor; 
            stroke-linecap: round; stroke-linejoin: round;
            transition: color 0.3s ease-out, stroke-width 0.3s ease-out;
        }

        /* Bottom Section - Guaranteed Layout Lock */
        .bottom-section { width: 100%; height: 10vh; position: relative; }
        .bottom-inner {
            position: absolute; top: 0; left: 0; display: flex; align-items: center; 
            justify-content: center; gap: 3vw; font-size: 4.5vh; line-height: 1.2; 
            font-weight: 900; color: #E5E7EB; text-transform: uppercase; 
            letter-spacing: -0.025em; width: 100%; padding: 0 4vw;
        }
        @media (min-width: 640px) { .bottom-inner { font-size: 5vh; } }
        .bottom-icon {
            width: 8vh; height: 8vh; color: #4ADE80; flex-shrink: 0; 
            stroke: currentColor; stroke-width: 2; fill: none; 
            stroke-linecap: round; stroke-linejoin: round;
        }
        .bottom-text {
            max-width: 75vw; text-align: center; white-space: normal; word-wrap: break-word;
        }

        /* Animation System */
        .fade-panel {
            transition: opacity 0.15s ease-out, transform 0.15s ease-out;
            opacity: 1; transform: translateY(0);
        }
        .fade-out { opacity: 0; transform: translateY(0px); }
        .fade-in { opacity: 0; transform: translateY(10px); }

        /* Fullscreen Button */
        .fullscreen-btn {
            position: absolute;
            bottom: 3vh;
            right: 3vw;
            width: 6vh;
            height: 6vh;
            background: rgba(255, 255, 255, 0.05); /* Extremely subtle */
            border: none;
            border-radius: 12px;
            color: #6B7280;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            backdrop-filter: blur(4px);
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #F9FAFB;
            transform: scale(1.05);
        }
        .fullscreen-btn svg {
            width: 3vh;
            height: 3vh;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <!-- Top Section -->
    <div class="top-section">
        <div class="label">Weight Collected</div>
        <div class="fade-panel value-huge" id="val-collected"></div>
    </div>

    <!-- Middle Section -->
    <div class="middle-section">
        <div class="grid-2">
            <div>
                <div class="label">Methane</div>
                <div class="fade-panel value-large" id="val-methane"></div>
            </div>
            <div>
                <div class="label">Electricity</div>
                <div class="fade-panel value-large" id="val-electricity"></div>
            </div>
        </div>

        <div class="bar-container">
            <div class="bar-fill" id="progress-fill"></div>
            <div class="nodes-container" id="nodes-canvas"></div>
        </div>
    </div>

    <!-- Bottom Section -->
    <div class="bottom-section">
        <div class="bottom-inner fade-panel">
            <svg class="bottom-icon" id="val-scene-icon" viewBox="0 0 24 24"></svg>
            <span class="bottom-text" id="val-scene-text"></span>
        </div>
    </div>

    <!-- Fullscreen Button -->
    <button class="fullscreen-btn" id="fullscreen-btn" aria-label="Toggle Fullscreen">
        <svg id="fullscreen-svg" viewBox="0 0 24 24">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
    </button>

    <script>
        // High-Quality Native SVG paths mirroring lucide icons
        const ICONS = {
            lightbulb: '<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
            bot: '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
            washingMachine: '<path d="M3 6h3"/><path d="M17 6h.01"/><rect width="14" height="20" x="5" y="2" rx="2"/><circle cx="12" cy="13" r="5"/><path d="M12 18a2.5 2.5 0 0 0 0-5 2.5 2.5 0 0 1 0-5"/>',
            home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
            airVent: '<path d="M6 12H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 8h12"/><path d="M18.3 17.7a2.5 2.5 0 0 1-3.16 3.83 2.53 2.53 0 0 1-1.14-2V12"/><path d="M6.6 15.6A2 2 0 1 0 10 17v-5"/>',
            bus: '<path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/>',
            car: '<path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/>',
            landmark: '<line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/>'
        };

        const NODES = [
            { collected: "1", methane: "0.08", electricity: "0.24", sceneIcon: "lightbulb", sceneText: "Lighting a home lamp for 10 h" },
            { collected: "10", methane: "0.8", electricity: "2.4", sceneIcon: "bot", sceneText: "1 full sweep & mop by a robot vacuum" },
            { collected: "30", methane: "2.4", electricity: "7.2", sceneIcon: "washingMachine", sceneText: "Washing & drying 1 load of laundry" },
            { collected: "100", methane: "8.0", electricity: "24", sceneIcon: "home", sceneText: "Powering 1 household for 1 day" },
            { collected: "150", methane: "12.0", electricity: "36", sceneIcon: "airVent", sceneText: "Running 1 AC unit cooling for 36 h" },
            { collected: "200", methane: "16.0", electricity: "48", sceneIcon: "bus", sceneText: "1 lap around the park by a sightseeing bus" },
            { collected: "250", methane: "20.0", electricity: "60", sceneIcon: "car", sceneText: "1 full charge for an electric car" },
            { collected: "300", methane: "24.0", electricity: "72", sceneIcon: "landmark", sceneText: "Powering the Burrell Collection for 1 day" }
        ];

        let currentIndex = 0;
        const nodesCanvas = document.getElementById('nodes-canvas');

        // Initial Progress Bar Node Creation
        NODES.forEach((node, i) => {
            const div = document.createElement('div');
            div.className = 'node-item';
            div.innerHTML = `<div class="node-wrapper" id="wrapper-${i}">
                <svg class="node-icon" id="icon-${i}" viewBox="0 0 24 24">${ICONS[node.sceneIcon]}</svg>
            </div>`;
            nodesCanvas.appendChild(div);
        });

        const updateDataDOM = () => {
            const node = NODES[currentIndex];
            document.getElementById('val-collected').innerText = node.collected + " KG";
            document.getElementById('val-methane').innerText = node.methane + " m³";
            document.getElementById('val-electricity').innerText = node.electricity + " KWh";
            document.getElementById('val-scene-text').innerText = node.sceneText;
            document.getElementById('val-scene-icon').innerHTML = ICONS[node.sceneIcon];
            
            // Progress Bar Update
            document.getElementById('progress-fill').style.width = ((currentIndex + 1) * 12.5) + '%';
            
            // Icon Scales & Colors
            for (let i = 0; i < NODES.length; i++) {
                const isPast = i <= currentIndex;
                const wrapper = document.getElementById(`wrapper-${i}`);
                const icon = document.getElementById(`icon-${i}`);
                
                if(isPast) {
                    wrapper.style.transform = 'scale(2.2)';
                    wrapper.style.filter = 'drop-shadow(0 0 8px #4ADE80)';
                    icon.style.color = 'white';
                    icon.style.strokeWidth = '2.2';
                } else {
                    wrapper.style.transform = 'scale(1)';
                    wrapper.style.filter = 'drop-shadow(0 0 0px transparent)';
                    icon.style.color = '#9CA3AF';
                    icon.style.strokeWidth = '2';
                }
            }
        };

        const triggerTransition = () => {
            const panels = document.querySelectorAll('.fade-panel');
            
            // Fade out
            panels.forEach(p => p.classList.add('fade-out'));
            
            setTimeout(() => {
                // Update Text & SVGs while invisible
                updateDataDOM();
                
                // Jump to entry position
                panels.forEach(p => {
                    p.classList.remove('fade-out');
                    p.classList.add('fade-in');
                });
                
                // Force layout reflow to execute transition
                void document.body.offsetWidth;
                
                // Execute Fade In
                panels.forEach(p => p.classList.remove('fade-in'));
            }, 150);
        };

        // Main Tap Interaction Engine
        document.body.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % NODES.length;
            triggerTransition();
        });

        // Fullscreen Toggle Logic
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const fullscreenSvg = document.getElementById('fullscreen-svg');
        
        const MAXIMIZE_PATH = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
        const MINIMIZE_PATH = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';

        fullscreenBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // VERY IMPORTANT: Prevents the click from reaching the body and changing the slide
            
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // Listen for standard fullscreen changes to update the icon
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenSvg.innerHTML = MINIMIZE_PATH;
            } else {
                fullscreenSvg.innerHTML = MAXIMIZE_PATH;
            }
        });

        // Bootstrap Initial UI
        updateDataDOM();

    </script>
</body>
</html>
